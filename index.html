<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chor-Konzert Ticketbuchung</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <h1>🎵 Chor-Konzert Ticketbuchung</h1>
    </div>
    <div class="nav-buttons">
      <button class="btn btn-outline" id="admin-btn" style="display: none;" onclick="window.location.href='admin.html'">
        Admin-Bereich
      </button>
      <button class="btn btn-outline" id="logout-btn" style="display: none;" onclick="authManager.logout()">
        Abmelden
      </button>
    </div>
  </header>

  <!-- Alert Container -->
  <div id="alert-container" style="position: fixed; top: 80px; right: 20px; max-width: 400px; z-index: 100;"></div>

  <!-- Main Container -->
  <div class="container">

    <!-- Auth Section (Before Login) -->
    <div id="auth-container" class="card" style="max-width: 500px; margin: 2rem auto;">
      <h2 style="text-align: center; margin-bottom: 2rem;">Willkommen! 👋</h2>

      <!-- Auth Tabs -->
      <div class="auth-tabs">
        <div class="auth-tab">
          <input type="radio" id="tab-login" name="auth-tab" checked>
          <label for="tab-login">Anmelden</label>
        </div>
        <div class="auth-tab">
          <input type="radio" id="tab-register" name="auth-tab">
          <label for="tab-register">Registrieren</label>
        </div>
      </div>

      <!-- Login Form -->
      <div id="login-form" class="form-section">
        <div class="form-group">
          <label>E-Mail *</label>
          <input type="email" id="login-email" placeholder="deine@email.com" required>
        </div>
        <div class="form-group">
          <label>Passwort *</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button class="btn btn-primary btn-block" onclick="handleLogin()">Anmelden</button>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="form-section" style="display: none;">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" id="register-name" placeholder="Max Mustermann" required>
        </div>
        <div class="form-group">
          <label>E-Mail *</label>
          <input type="email" id="register-email" placeholder="deine@email.com" required>
        </div>
        <div class="form-group">
          <label>Passwort *</label>
          <input type="password" id="register-password" placeholder="Mindestens 6 Zeichen" required>
        </div>
        <div class="form-group">
          <label>Passwort wiederholen *</label>
          <input type="password" id="register-password-confirm" placeholder="Passwort wiederholen" required>
        </div>
        <button class="btn btn-primary btn-block" onclick="handleRegister()">Registrieren</button>
      </div>

      <script>
        // Tab Switching
        document.getElementById("tab-login").addEventListener("change", () => {
          document.getElementById("login-form").style.display = "block";
          document.getElementById("register-form").style.display = "none";
        });

        document.getElementById("tab-register").addEventListener("change", () => {
          document.getElementById("login-form").style.display = "none";
          document.getElementById("register-form").style.display = "block";
        });

        // Handle Login
        async function handleLogin() {
          const email = document.getElementById("login-email").value;
          const password = document.getElementById("login-password").value;
          if (!email || !password) {
            authManager.showAlert("Bitte fülle alle Felder aus.", "error");
            return;
          }

          try {
            await authManager.login(email, password);
          } catch (error) {
            console.error("Login failed:", error);
          }
        }

        // Handle Register
        async function handleRegister() {
          const name = document.getElementById("register-name").value;
          const email = document.getElementById("register-email").value;
          const password = document.getElementById("register-password").value;
          const passwordConfirm = document.getElementById("register-password-confirm").value;

          if (!name || !email || !password || !passwordConfirm) {
            authManager.showAlert("Bitte fülle alle Felder aus.", "error");
            return;
          }

          if (password !== passwordConfirm) {
            authManager.showAlert("Passwörter stimmen nicht überein.", "error");
            return;
          }

          try {
            await authManager.register(email, password, name);
          } catch (error) {
            console.error("Registration failed:", error);
          }
        }
      </script>
    </div>

    <!-- Main Page (After Login) -->
    <div id="main-page" class="auth-page">
      <!-- Welcome Section -->
      <div class="card" style="text-align: center; background: linear-gradient(135deg, #6366f1, #ec4899); color: white;">
        <h2 style="color: white; margin-bottom: 0;">Willkommen, <span id="user-name">Nutzer</span>! 🎶</h2>
        <p>Buche deine Tickets für unsere kommenden Chor-Konzerte</p>
      </div>

      <!-- Events Section -->
      <div class="card">
        <h2>📅 Verfügbare Events</h2>
        <div id="events-container" class="events-grid">
          <div style="text-align: center; padding: 2rem;">
            <div class="spinner"></div>
            <p>Lade Events...</p>
          </div>
        </div>
      </div>

      <!-- My Bookings Section -->
      <div class="card">
        <h2>🎫 Meine Tickets</h2>
        <div id="bookings-container">
          <div style="text-align: center; padding: 2rem;">
            <div class="spinner"></div>
            <p>Lade Tickets...</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Booking Modal -->
  <div id="booking-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Ticket buchen</h2>
        <button class="close-btn" onclick="bookingManager.closeBookingModal()">✕</button>
      </div>
      <div id="booking-form-content"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- Our JavaScript Files -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/events.js"></script>
  <script src="js/booking.js"></script>

  <!-- Initialize on Page Load -->
  <script>
    window.addEventListener("load", async () => {
      // Wait for auth state to be determined
      auth.onAuthStateChanged(async (user) => {
        if (user) {
          // User is logged in - load content
          await eventsManager.displayEvents("events-container");
          await bookingManager.displayUserBookings("bookings-container");
          await authManager.checkAdminStatus();
          authManager.updateUI();
        } else {
          const eventsContainer = document.getElementById("events-container");
          const bookingsContainer = document.getElementById("bookings-container");
          if (eventsContainer) {
            eventsContainer.innerHTML = "<p>Bitte melde dich an, um verfügbare Events zu sehen.</p>";
          }
          if (bookingsContainer) {
            bookingsContainer.innerHTML = "<p>Bitte melde dich an, um deine Tickets zu sehen.</p>";
          }
        }
      });
    });

    // Close modal on click outside
    document.addEventListener("click", (e) => {
      const modal = document.getElementById("booking-modal");
      if (e.target === modal) {
        bookingManager.closeBookingModal();
      }
    });
  </script>
</body>
</html>
